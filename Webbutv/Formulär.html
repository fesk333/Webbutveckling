<!DOCTYPE html>

<html lang="sv">
    <head>
        <meta charset="utf-8">
        <title>Formulär</title>
        <link rel="stylesheet" href="Formulär.css">
        
    <body>

        <form>
            <label for="fname">Namn:</label>
            <input type="text" id="fname" name="fname">
            <br>
            <label for="lname">Efternamn:</label>
            <input type="text" id="lname" name="lname">
            <br>
            <label for="mail">Mail:</label>
            <input type="email" id="mail" name="mail">
            <br>
            <br>

            <label for="utbildningsp">Utbildningsprogram</label>
            <br>
            <input type="radio" id="Teknik" name="utbp" value="Teknik">
            <label for="Teknik">Teknik</label>

            <input type="radio" id="Vård och omsorg" name="utbp" value="Vård och omsorg">
            <label for="Vård och omsorg">Vård och omsorg</label>

            <input type="radio" id="El och energi" name="utbp" value="El och energi">
            <label for="El och energi">El och energi</label>
            <br>
            <br>
            <input type="button" onclick="alert('Användarvillkor')" value="Användarvillkor">
            <br>
            <label for="godkänn">Jag accepterar användarvillkoren</label>
            <input type="checkbox" id="godkänn" name="godkänn" value="godkänn">
            <br>
            <br>
            <label for="hemkommun">Hemkommun</label>
            <select name="hemkommun" id="hemkommun">
                <option value="Växjö">Växjö</option>
                <option value="Kalmar">Kalmar</option>
                <option value="Tingsryd">Tingsryd</option>
                <option value="Linköping">Linköping</option>
            </select>
            <br>
            <br>
            <textarea name="valfritt" rows="10" cols="40">Valfritt</textarea>
            <br>
            <label for="favcolor">Välj din favoritfärg:</label>
            <input type="color" id="favcolor" name="favcolor">
            <br>
            <label for="favdate">Välj ditt favoritdatum:</label>
            <input type="date" id="favdate" name="favdate">
            <br>
            <label for="favnumber">Välj ditt favorit ensiffriga nummer:</label>
            <input type="number" id="favnumber" name="favnumber" min="0" max="9">
            <br>
            <br>
            <input type="submit" value="Skicka in" onclick="alert('Tack för att du lämnade in!')">

        </form>

    </body>
</html>
